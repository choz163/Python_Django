{% extends 'blog/base.html' %}

{% block content %}
    <div class="container">
        <h2 class="my-4">Подтверждение удаления</h2>
        <p>Вы уверены, что хотите удалить пост "{{ post.title }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a class="btn btn-secondary" href="{% url 'blog:post_detail' post.pk %}">Отмена</a>
        </form>
    </div>
{% endblock %}
