{% extends 'blog/base.html' %}

{% block content %}
    <div class="container">
        <h2 class="my-4">Список постов</h2>
        <div class="list-group">
            {% for post in posts %}
                <a href="{% url 'blog:post_detail' post.pk %}" class="list-group-item list-group-item-action">
                    <h5 class="mb-1">{{ post.title }}</h5>
                    <p class="mb-1">{{ post.excerpt }}</p>
                    <small>Опубликовано {{ post.created_at|date:"d M Y" }}</small>
                </a>
            {% empty %}
                <p>Нет доступных постов.</p>
            {% endfor %}
        </div>
        <a class="btn btn-primary mt-3" href="{% url 'blog:post_create' %}">Создать новый пост</a>
    </div>
{% endblock %}
