{% extends 'blog/base.html' %}

{% block content %}
    <div class="container">
        <h2 class="my-4">{% if post %}Редактировать пост{% else %}Создать новый пост{% endif %}</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="title" class="form-label">Заголовок</label>
                <input type="text" class="form-control" id="title" name="title" value="{{ post.title|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Содержимое</label>
                <textarea class="form-control" id="content" name="content" rows="5" required>{{ post.content|default:'' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">{% if post %}Сохранить изменения{% else %}Создать пост{% endif %}</button>
            <a class="btn btn-secondary" href="{% url 'blog:post_list' %}">Отмена</a>
        </form>
    </div>
{% endblock %}
