{% extends 'blog/base.html' %}
{% block content %}
    <div class="container">
        <h2 class="my-4">{% if object %}Редактировать пост{% else %}Создать новый пост{% endif %}</h2>
        <form method="post" enctype="multipart/form-data">  <!-- Добавьте enctype для загрузки изображений -->
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">{% if object %}Сохранить изменения{% else %}Создать пост{% endif %}</button>
            <a class="btn btn-secondary" href="{% url 'blog:post_list' %}">Отмена</a>
        </form>
    </div>
{% endblock %}
