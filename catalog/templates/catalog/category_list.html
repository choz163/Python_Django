{% extends 'base.html' %}
	{% block content %}
	<div class="album py-5 bg-body-tertiary">
	    <div class="container">
	      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
	        {% for one_category in object_list %}
	        <div class="col">
	          <div class="card shadow-sm">
	            <img src="{{ one_category.image.url }}">
	            <div class="card-body">
	              <p class="card-text">{{ one_category.name }}</p>
	              <div class="d-flex justify-content-between align-items-center">
	                <div class="btn-group">
                        <a class="btn btn-primary" href="{% url 'catalog:category_list' one_category.pk %}" role="button">Посмотреть</a>
						<a class="btn btn-primary" href="{% url 'catalog:category_update' one_category.pk %}" role="button">Редактировать</a>
						<a class="btn btn-primary" href="{% url 'catalog:category_delete' one_category.pk %}" role="button">Удалить</a>
	                </div>
	              </div>
	            </div>	</div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
