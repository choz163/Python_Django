{% extends 'base.html' %}
	{% block content %}
<div class="conteiner">
  <div class="row">
    <div class="col-1">
        <form class="row" method="post" enctype="multipart/form-data">
            <div class="card">
                <p class="card-text">Вы действительно хотите удалить {{ product.name }}</p>
                <div class="card-body">
                    {% csrf_token %}
                </div>
                <button type="submit" class="btn btn-primary">Удалить</button>
                <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
  </div>
</div>
{% endblock %}
